<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Bread 🥖</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥖</text></svg>">

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap');

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(160deg, #ece9ff, #ffffff);
  min-height: 100vh;
  display: block;
}

.card {
  backdrop-filter: blur(16px);

  /* stronger surface */
  background: rgba(255, 255, 255, 0.8);

  border-radius: 24px;
  padding: 30px 24px;
  width: 90%;
  max-width: 420px;
  text-align: center;

  /* stronger shadow */
  box-shadow: 
    0 12px 30px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);

  margin: 20px auto;

  /* subtle edge */
  border: 1px solid rgba(255,255,255,0.4);
}

#verseCard {
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.verse-box {
  padding: 32px 20px;
  background: rgba(255,255,255,0.30);
  border-radius: 16px;

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.title {
  font-size: 14px;
  letter-spacing: 1.5px;
  color: #777;
  margin-bottom: 16px;
  white-space: pre-line;
}

.name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  margin-bottom: 18px;
  opacity: 0.85;
  white-space: pre-line;
}

.verse {
  color: #2b2b2b;
  text-shadow: 0 1px 2px rgba(255,255,255,0.5);
}

.ref {
  color: #555;
}

.divider {
  width: 40px;
  height: 2px;
  background: linear-gradient(to right, transparent, #b58b3a, transparent);
  margin: 16px auto;
}

.footer {
  font-size: 12px;
  color: rgba(0,0,0,0.4);
  margin-top: 18px;
  letter-spacing: 0.3px;
}

.footer-brand {
  margin-top: 24px;
  text-align: center;
  color: #b8b8b8;
  font-size: 11px;
}

.brand-top {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 4px;
}

.brand-top img {
  height: 14px;
  opacity: 0.7;
}

.brand-product {
  font-size: 12px;
  color: #999;
  margin-bottom: 2px;
}
  
.share-btn {
  margin-top: 12px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #b58b3a;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

.mug-row {
  display:flex;
  gap:8px;
  justify-content:center;
  margin:12px 0;
}

.mug-row img {
  width: 100%;
  max-width: 320px;
  border-radius: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);

<body>

<!-- CARD 1 (VERSE) -->
<div class="card" id="verseCard">

  <div class="name" id="name"></div>

  <div class="verse-box" id="verseBox">
    <div class="verse" id="verse">Loading...</div>
    <div class="divider"></div>
    <div class="ref" id="ref"></div>
  </div>

  <div class="footer" id="footer">Scan again tomorrow 🥖</div>

  <button id="shareBtn" onclick="sharePage()" class="share-btn">Share</button>
</div>


<!-- CARD 2 (CTA) -->
<div class="card" id="ctaCard" style="display:none;">

  <div id="ctaText" style="font-size:14px; color:#666;"></div>

  <div class="mug-row" id="mugImages"></div>

  <a href="https://your-etsy-link.com" target="_blank">
    <button class="share-btn">Get Your Daily Bread Mug ☕</button>
  </a>

  <div class="footer-brand">
    <div class="brand-top">
      <img src="assets/logo.png"> <span>Weekrend Project</span>
    </div>
    <div class="brand-product">© 2026 Daily Bread 🥖</div>
  </div>

<script>

const name = params.get("name") || "";

const date = params.get("date") || "";
const msg = params.get("msg") || "";
const sharedBy = params.get("sharedBy") || "";

  love: "assets/bg-love.png",

  document.getElementById("shareBtn").style.display = "none";
  document.getElementById("footer").style.display = "none";

  document.getElementById("ctaCard").style.display = "block";

  document.getElementById("ctaText").innerHTML =
    'Enjoy your coffee with fresh <b>"Daily Bread"</b> every day ☕';

  const container = document.getElementById("mugImages");
  container.innerHTML = "";

  const img = document.createElement("img");
  img.src = mugSets[type] || mugSets["peace"];
  img.style.width = "100%";
  img.style.maxWidth = "320px";
  img.style.borderRadius = "14px";

} else {

const list = verses[type] || verses["peace"];
const today = new Date();
const seed = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate();

function seededIndex(seed, max){
  const x = Math.sin(seed)*10000;
  return Math.floor((x - Math.floor(x))*max);
}

const selected = list[seededIndex(seed, list.length)];

const verseEl = document.getElementById("verse");
verseEl.innerText = "“" + selected.text + "”";

document.getElementById("ref").innerText = selected.ref;
  
verseEl.style.opacity = 1;

/* SHARE */
function sharePage() {
  const url = new URL(window.location.href);
  url.searchParams.set("sharedBy", name);
  const link = url.toString();

  if (navigator.share) {
    navigator.share({ title:"Daily Bread", url:link });
  } else {
    navigator.clipboard.writeText(link);
    alert("Link copied!");
  }
}

/* SHARED MODE */
if(sharedBy){

  // Title
  document.getElementById("title").innerText =
    "✝️ DAILY BREAD 🥖 for you today\nshared by " + sharedBy;

  // Hide unnecessary
  document.getElementById("name").style.display = "none";
  document.getElementById("shareBtn").style.display = "none";
  document.getElementById("footer").style.display = "none";

  // Show CTA card
  document.getElementById("ctaCard").style.display = "block";

  document.getElementById("ctaText").innerHTML =
    'Enjoy your coffee with fresh <b>"Daily Bread"</b> every day ☕';

  // Mug image
  const container = document.getElementById("mugImages");
  container.innerHTML = "";

  const img = document.createElement("img");
  img.src = mugSets[type] || mugSets["peace"];
  img.alt = type + " mug preview";
