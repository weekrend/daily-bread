<script>
let currentQR = "";

// 🔐 SAME SECRET as index.html
const SECRET = "dailybread_secret_key";

// 🔐 Generate token
function generateToken(name, type) {
  const raw = name + "|" + type + "|" + SECRET;
  return btoa(raw).replace(/=/g, "");
}

function generate() {
  const base = "https://weekrend.github.io/daily-bread/";

  const nameRaw = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const dateRaw = document.getElementById("date").value;
  const msgRaw = document.getElementById("msg").value;

  const name = encodeURIComponent(nameRaw);
  const date = encodeURIComponent(dateRaw);
  const msg = encodeURIComponent(msgRaw);

  // 🔐 generate token (IMPORTANT: use RAW value, not encoded)
  const token = generateToken(nameRaw, type);

  let url = base + "?name=" + name + "&type=" + type + "&t=" + token;

  if(type === "love" && dateRaw){
    url += "&date=" + date;
  }

  if(type !== "love" && msgRaw){
    url += "&msg=" + msg;
  }

  // show result
  document.getElementById("result").innerText = url;

  // QR
  currentQR = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(url);

  document.getElementById("qrImg").src = currentQR;
}

function copy() {
  const text = document.getElementById("result").innerText;
  if(!text) return;

  navigator.clipboard.writeText(text);
  alert("Link copied!");
}

function downloadQR() {
  if(!currentQR) return;

  const a = document.createElement("a");
  a.href = currentQR;
  a.download = "daily-bread-qr.png";
  a.click();
}
</script>
