<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍞 Daily Bread</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(160deg, #f3f1ee, #ffffff);
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  padding: 30px 20px;
  width: 90%;
  max-width: 420px;
  text-align: center;

  box-shadow:
    0 12px 30px rgba(0,0,0,0.08),
    0 2px 6px rgba(0,0,0,0.04);
}

.title {
  font-size: 14px;
  letter-spacing: 2px;
  color: #888;
  margin-bottom: 10px;
}

.message {
  font-size: 18px;
  margin-bottom: 20px;
  color: #333;
  line-height: 1.4;
}

.mug {
  width: 100%;
  max-width: 320px;
  border-radius: 16px;
  margin: 15px 0;
}

.cta {
  display: block;
  margin-top: 15px;
  padding: 14px;
  border-radius: 14px;
  background: #b88a3c;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #999;
}

.footer-brand {
  margin-top: 24px;
  text-align: center;
  color: #b8b8b8;
  font-size: 11px;
}

.brand-top {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 4px;
}

.brand-top img {
  height: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="title">🍞 DAILY BREAD</div>

    <div class="message">
      Please purchase our product to access this page.
    </div>

    <!-- 🔥 Mug showcase -->
    <img src="assets/love.png" class="mug">
    <img src="assets/peace.png" class="mug">
    <img src="assets/strength.png" class="mug">
    <img src="assets/guidance.png" class="mug">

    <!-- CTA -->
    <a href="https://your-etsy-link.com" target="_blank" class="cta">
      Get Your Daily Bread Mug ☕
    </a>

    <div class="footer-brand">
      <div class="brand-top">
        <img src="assets/logo.png"> <span>Weekrend Project</span>
      </div>
      <div class="brand-product">© 2026 Daily Bread 🥖</div>
    </div>

  </div>
</div>

</body>
</html>
